<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Result | Product Details</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.png" alt="Living Result" class="logo-img"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Shop</a></li>
                <li><a href="index.html#products">Categories</a></li>
                <li><a href="index.html#why-choose">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <button aria-label="Search" id="searchBtn" onclick="toggleSearch()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </button>
                <button aria-label="Cart" id="cartBtn" onclick="toggleCart()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <circle cx="9" cy="21" r="1" />
                        <circle cx="20" cy="21" r="1" />
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                    </svg>
                </button>
                <button class="hamburger" id="hamburger"
                    aria-label="Menu"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <!-- SEARCH AND CART OVERLAYS -->
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <div class="search-overlay" id="searchOverlay">
        <div class="search-overlay-content">
            <button class="search-close" onclick="toggleSearch()">&times;</button>
            <h3>Search Products</h3>
            <div class="search-input-wrap">
                <input type="text" id="searchInput" placeholder="Search for supplements..." autocomplete="off"
                    oninput="handleSearch(this.value)">
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-sidebar-header">
            <h3>Your Cart</h3>
            <button class="cart-close" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-sidebar-body" id="cartBody"></div>
    </div>
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

    <!-- SINGLE PRODUCT SECTION -->
    <section class="product-page-section" style="padding: 120px 0 60px 0; min-height: 80vh;">
        <div class="container" id="singleProductContainer">
            <div style="text-align: center; color: white; padding: 100px 0;">
                <h2>Loading Product...</h2>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer" id="footer" style="margin-top: auto;">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo"><img src="images/logo.png" alt="Living Result" style="height:80px;"></div>
            </div>
            <div class="footer-copy">&copy; 2026 Living Result. All rights reserved. | #WEARETHELIVINGRESULT</div>
        </div>
    </footer>

    <!-- IMAGE LIGHTBOX OVERLAY -->
    <div class="modal-overlay" id="imageLightboxOverlay" onclick="closeImageLightbox(event)"
        style="z-index: 20000; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center;">
        <button class="modal-close" onclick="closeImageLightbox({target: this})"
            style="color: #fff; z-index: 20001; right: 20px; top: 20px;">&times;</button>
        <img id="lightboxImage" src="" alt="Zoomed Product"
            style="max-width: 90vw; max-height: 90vh; object-fit: contain; cursor: zoom-in; transition: transform 0.3s ease;"
            onclick="toggleZoom(event)">
    </div>

    <!-- CHECKOUT MODAL OVERLAY -->
    <div class="modal-overlay" id="checkoutModalOverlay" onclick="closeCheckoutModal(event)">
        <div class="modal-content" style="max-width: 500px; padding: 30px;">
            <button class="modal-close" onclick="closeCheckoutModal({target: this})">&times;</button>
            <h2
                style="font-family: var(--font-heading); font-size: 24px; text-transform: uppercase; margin-bottom: 20px;">
                Checkout Details</h2>
            <div id="checkoutSummary"
                style="background: rgba(255, 106, 0, 0.1); border: 1px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            </div>
            <form id="checkoutForm" onsubmit="processCheckout(event)">
                <div style="margin-bottom: 15px;"><input type="text" id="checkoutName" placeholder="Full Name" required
                        style="width: 100%; padding: 12px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; color: #fff;">
                </div>
                <div style="margin-bottom: 15px;"><input type="tel" id="checkoutPhone" placeholder="Phone Number"
                        required
                        style="width: 100%; padding: 12px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; color: #fff;">
                </div>
                <div style="margin-bottom: 20px;"><textarea id="checkoutAddress" placeholder="Delivery Address" required
                        rows="3"
                        style="width: 100%; padding: 12px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; color: #fff;"></textarea>
                </div>
                <button type="submit" class="btn-primary"
                    style="width: 100%; justify-content: center; background: #25D366; border-color: #25D366;">Proceed to
                    WhatsApp Order</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
